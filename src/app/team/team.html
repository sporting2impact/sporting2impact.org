<!-- Founders Section -->
<section class="team-section">
  <h2 class="section-title">Founders</h2>

  <div class="team-grid">
    <div class="team-card founder-card" *ngFor="let founder of founders">
      <!-- <div class="badge badge-founder">Founder</div> -->

      <!-- <img class="team-photo" [src]="founder.image" alt="{{ founder.name }}"> -->

      <h3 class="team-name">{{ founder.name }}</h3>
      <p><strong>Role:</strong> {{ founder.role }}</p>

      <p class="team-bio" *ngIf="founder.bio">
        {{ founder.bio }}
      </p>
    </div>
  </div>
</section>

<!-- Board of Directors Section -->
<section class="team-section">
  <h2 class="section-title">Board of Directors</h2>

  <div class="team-grid board-grid">
    <div class="team-card horizontal" *ngFor="let member of boardOfDirectors">

      <!-- <img class="team-photo board-photo" [src]="member.image" alt="{{ member.name }}"> -->

      <div class="details">
        <h3 class="team-name">{{ member.name }}</h3>

        <p><strong>School:</strong> {{ member.school }}</p>
        <p><strong>Grade:</strong> {{ member.grade }}</p>
        <p><strong>Duration:</strong> {{ member.duration }}</p>
        <p><strong>Role:</strong> {{ member.role }}</p>
        <p class="team-bio" *ngIf="member.bio">
          {{ member.bio }}
        </p>
      </div>

    </div>
  </div>
</section>
